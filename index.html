<html lang="ja">
<head>

 <meta

<meta property="og:title" content="今日なに食べよーかな？">
<meta property="og:description" content="今日のごはんが決められないあなたに、ランダムでメニューを提案するアプリです。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ponpon1129014.github.io/meal-app/">
<meta property="og:image" content="https://ponpon1129014.github.io/meal-app/images/ogp.jpg">

  <title>今日なに食べよーかな</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="container">
    <h1>今日なに食べよーかな？</h1>

    <div class="main">

      <div class="meal-card">
        <div class="filter-buttons">
          <button class="filter-btn" data-type="light">あっさり</button>
          <button class="filter-btn" data-type="normal">そこそこ</button>
          <button class="filter-btn" data-type="heavy">がっつり</button>
        </div>
        <div class="image-frame">
          <img id="mealImage" src="images/default.jpg" alt="">
        </div>
        <div class="result-card">
          <div id="result">？？？</div>
        </div>
        <p id="selectedLabel"></p>
        <button id="chooseButton">これにする！</button>
      </div>

      <div class="side-column">
        <div class="history-area">
          <h2>最近の結果</h2>
          <ul id="historyList"></ul>
        </div>
        <div class="comment-area">
          <h2>ひとこと</h2>
          <p id="commentText">今日なに食べる？ 🍚</p>
        </div>
      </div>

    </div>

    <footer class="footer">
      ごはんが決められないあなたに今日のごはんを提案するアプリです。
    </footer>

  </div>

  <script src="meals.js"></script>
  <script src="script.js"></script>
</body>

</html>
