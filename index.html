<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta
  name="description"
  content="今日のごはんが決められないあなたに、ランダムでメニューを提案するアプリです。あっさり・そこそこ・がっつりで絞り込めます。"

<meta property="og:title" content="今日なに食べよーかな？">
<meta property="og:description" content="今日のごはんが決められないあなたに、ランダムでメニューを提案するアプリです。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ponpon1129014.github.io/meal-app/">
<meta property="og:image" content="https://ponpon1129014.github.io/meal-app/images/ogp.png">

  <title>今日なに食べよーかな</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="container">
    <h1>今日なに食べよーかな？</h1>

    <div class="main">

      <div class="meal-card">

        <div class="filter-section">
          <div class="vol-label">ボリューム（必須）</div>
          <div class="filter-buttons">
            <button class="filter-btn" data-type="light">あっさり</button>
            <button class="filter-btn" data-type="normal">そこそこ</button>
            <button class="filter-btn" data-type="heavy">がっつり</button>
          </div>

          <div class="filter-divider"></div>

          <div class="dropdown-wrap">
            <button class="dropdown-trigger" id="catTrigger" aria-expanded="false">
              <span id="catTriggerLabel">カテゴリで絞り込む</span>
              <span class="dropdown-arrow">▾</span>
            </button>
            <div class="dropdown-panel" id="catPanel" hidden>
              <label class="chk-item"><input type="checkbox" value="rice"> ご飯もの</label>
              <label class="chk-item"><input type="checkbox" value="noodle"> 麺類</label>
              <label class="chk-item"><input type="checkbox" value="meat"> 肉料理</label>
              <label class="chk-item"><input type="checkbox" value="fish"> 魚料理</label>
              <label class="chk-item"><input type="checkbox" value="flour"> 粉もの・チーズ系</label>
              <label class="chk-item"><input type="checkbox" value="nabe"> 鍋・汁物</label>
              <label class="chk-item"><input type="checkbox" value="side"> 軽食・サイド</label>
            </div>
            <div class="badge-row" id="catBadges"></div>
          </div>

          <div class="dropdown-wrap">
            <button class="dropdown-trigger" id="tagTrigger" aria-expanded="false">
              <span id="tagTriggerLabel">気分で絞り込む</span>
              <span class="dropdown-arrow">▾</span>
            </button>
            <div class="dropdown-panel" id="tagPanel" hidden>
              <label class="chk-item"><input type="checkbox" value="辛い"> 辛い</label>
              <label class="chk-item"><input type="checkbox" value="揚げ物"> 揚げ物</label>
              <label class="chk-item"><input type="checkbox" value="野菜多め"> 野菜多め</label>
              <label class="chk-item"><input type="checkbox" value="ごちそう系"> ごちそう系</label>
              <label class="chk-item"><input type="checkbox" value="ジャンク系"> ジャンク系</label>
              <label class="chk-item"><input type="checkbox" value="おつまみ系"> おつまみ系</label>
            </div>
            <div class="badge-row" id="tagBadges"></div>
          </div>
        </div>

        <div class="image-frame">
          <img id="mealImage" src="images/default.png" alt="">
        </div>

        <div class="result-card">
          <div id="result">？？？</div>
          <a id="detailLink" href="#" style="display:none;">→もっと見る</a>
        </div>

        <p id="selectedLabel"></p>
        <button id="chooseButton" disabled>これにする！</button>
      </div>

      <div class="side-column">
        <div class="history-area">
          <h2>最近の結果</h2>
          <ul id="historyList"></ul>
        </div>
        <div class="comment-area">
          <h2>ひとこと</h2>
          <p id="commentText">今日なに食べる？ 🍚</p>
        </div>
      </div>

    </div>

<footer class="footer">
  ごはんが決められないあなたに今日のごはんを提案するアプリです。<br>
  <a href="privacy.html" style="color: rgba(255,255,255,0.6); font-size: 12px;">プライバシーポリシー</a>
</footer>

  </div>

  <script src="meals.js"></script>
  <script src="script.js"></script>
</body>

</html>
