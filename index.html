<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日なに食べよーかな</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.jpg">

  <style>

    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: gray;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 700px;
    }

    h1 {
      margin-bottom: 30px;
      color: white;
    }

    #result {
      font-size: 28px;
      margin-bottom: 30px;
      min-height: 40px;
      transition: all 0.3s ease;
      color: black;
     }

    .spinning {
      transform: scale(1.2);
      opacity: 0.4;
      filter: blur(1px);
     }

     .pop {
       animation: pop 0.4s ease;
     }

@keyframes pop {
  0% {
    transform: scale(0.6);
  }
  60% {
    transform: scale(1.3);
  }
  100% {
    transform: scale(1);
  }
}
    button {
      background: #ff7f50;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:active {
    transform: scale(0.95);
    }

    button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

button:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-2px);
}

#historyList {
  color: white;
  text-align: left;
  padding-left: 20px;

  max-height: 300px;
  overflow-y: auto;
}

#historyList li {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
}

.meal-card {
  background: white;

  border-radius: 20px;

  padding: 20px;

  margin-bottom: 20px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.1);

  transition: transform 0.2s ease;

  flex: 1;

}

#mealImage {
  width: 100%;
  aspect-ratio: 1 / 1;
  height: 300px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
  transition: opacity 0.3s ease;
}

select {
  width: 100%;
  padding: 12px;
   box-sizing: border-box;
  margin-bottom: 20px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  background: #f5f5f5;
color: #333;
}

.footer {
  color: white;
  font-size: 12px;
  margin-top: 15px;
}

.content {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

@media (max-width: 600px) {
  .content {
    flex-direction: column;
  }

    .container {
    padding: 20px;
  }

  #mealImage {
    height: 240px;
  }

}

.history-area {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);

  padding: 20px;
  border-radius: 20px;

  color: white;

  min-width: 140px;
  width: 140px;
max-height: 300px;
overflow-y: auto;
}

.history-area h2 {
  font-size: 18px;
  margin-top: 0;
}

  </style>

   
</head>

<body>

  <div class="container">
    <h1>今日なに食べよーかな？</h1>

<div class="content">

 <div class="meal-card">

    <select id="type">
      <option value="all">全部</option>
      <option value="light">あっさり</option>
      <option value="normal">そこそこ</option>
      <option value="heavy">がっつり</option>
    </select>

<img
  id="mealImage"
  src="images/default.jpg"
  alt=""
>
  <div id="result">？？？</div>

    <button id="chooseButton">
      これにする！
    </button>

      </div>

  <div class="history-area">

    <h2>最近の結果</h2>

<ul id="historyList"></ul>

  </div>

</div>

<p class="footer">今日のご飯をランダム提案</p>

  </div>

  <script>

const result =
document.getElementById("result");

const typeSelect =
document.getElementById("type");

const mealImage =
document.getElementById("mealImage");

const historyList =
document.getElementById("historyList");

const button =
document.getElementById("chooseButton");

let historyData = [];

button.addEventListener("click", chooseMeal);

mealImage.onerror = () => {
  mealImage.src = "images/default.jpg";
};

const savedHistory = localStorage.getItem("mealHistory");

if (savedHistory) {

  historyData = JSON.parse(savedHistory);

  historyData.forEach(mealName => {

    const li = document.createElement("li");

    li.textContent = mealName;

    historyList.appendChild(li);

  });

}

    const meals = [

  { name: "カレー", type: "heavy", image: "images/curry.jpg" },
  { name: "ラーメン", type: "heavy", image: "images/ramen.jpg" },
  { name: "寿司", type: "heavy", image: "images/sushi.jpg" },
  { name: "焼肉", type: "heavy", image: "images/yakiniku.jpg" },
  { name: "ハンバーグ", type: "heavy", image: "images/hamburg.jpg" },
  { name: "ステーキ", type: "heavy", image: "images/steak.jpg" },
  { name: "チャーハン", type: "heavy", image: "images/friedrice.jpg" },
  { name: "唐揚げ", type: "heavy", image: "images/karaage.jpg" },
  { name: "牛丼", type: "heavy", image: "images/gyudon.jpg" },
  { name: "天丼", type: "heavy", image: "images/tendon.jpg" },

  { name: "うどん", type: "light", image: "images/udon.jpg" },
  { name: "そば", type: "light", image: "images/soba.jpg" },
  { name: "サラダ", type: "light", image: "images/salad.jpg" },
  { name: "サンドイッチ", type: "light", image: "images/sandwich.jpg" },
  { name: "おにぎり", type: "light", image: "images/onigiri.jpg" },
  { name: "スープ", type: "light", image: "images/soup.jpg" },
  { name: "冷やし中華", type: "light", image: "images/hiyashi.jpg" },
  { name: "ヨーグルト", type: "light", image: "images/yogurt.jpg" },
  { name: "フルーツ", type: "light", image: "images/fruits.jpg" },
  
  { name: "親子丼", type: "normal", image: "images/oyakodon.jpg" },
  { name: "オムライス", type: "normal", image: "images/omurice.jpg" },
  { name: "ナポリタン", type: "normal", image: "images/napolitan.jpg" },
  { name: "餃子", type: "normal", image: "images/gyoza.jpg" },
  { name: "焼きそば", type: "normal", image: "images/yakisoba.jpg" },
  { name: "グラタン", type: "normal", image: "images/gratin.jpg" },
  { name: "ドリア", type: "normal", image: "images/doria.jpg" },
  { name: "ピザ", type: "normal", image: "images/pizza.jpg" },
  { name: "たこ焼き", type: "normal", image: "images/takoyaki.jpg" },
  { name: "お好み焼き", type: "normal", image: "images/okonomiyaki.jpg" }

];

function chooseMeal() {

  const type = typeSelect.value;

  let filtered = meals;
  if (type !== "all") {
    filtered = meals.filter(m => m.type === type);
  }

  let count = 0;
  const maxCount = 15;

  result.textContent = "ガチャ中...";

  result.classList.add("spinning");
  button.disabled = true;  

  const interval = setInterval(() => {
    const randomIndex = Math.floor(Math.random() * filtered.length);
    result.textContent = filtered[randomIndex].name;

    count++;

    if (count >= maxCount) {
      clearInterval(interval);

      result.classList.remove("spinning");

      setTimeout(() => {

        mealImage.style.opacity = 0;

const finalIndex = Math.floor(Math.random() * filtered.length);

setTimeout(() => {

  mealImage.src =
  filtered[finalIndex].image;

  mealImage.style.opacity = 1;

}, 150);

        result.textContent = "🎯 " + filtered[finalIndex].name;

const li = document.createElement("li");

li.textContent =
filtered[finalIndex].name;

historyList.prepend(li);

historyData.unshift(filtered[finalIndex].name);

if (historyData.length > 5) {
  historyData.pop();
}

localStorage.setItem(
  "mealHistory",
  JSON.stringify(historyData)
);

if (historyList.children.length > 5) {
  historyList.removeChild(historyList.lastChild);
}

        result.classList.remove("pop");
        void result.offsetWidth; 
        result.classList.add("pop");
        button.disabled = false;

      }, 150);
    }
  }, 80);
}

  self.addEventListener("install", event => {
  console.log("Service Worker installed");
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => {
      console.log("Service Worker Registered");
    });
}

  </script>

</body>
</html>
