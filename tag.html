<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タグ一覧 | 今日なに食べよーかな</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div class="container">
    <div class="tag-page">
      <h1 id="tagTitle"></h1>
      <p id="tagDesc"></p>
      <ul id="tagMealList"></ul>
      <a href="index.html" class="back-btn">← トップに戻る</a>
    </div>
  </div>

  <script src="meals.js"></script>
  <script>
    const tagDescs = {
      "辛い":     "ピリッと刺激的な辛さが食欲をかき立てる一品",
      "揚げ物":   "サクサク食感がたまらない満足度抜群のメニュー",
      "野菜多め": "野菜をたっぷり楽しめるヘルシーな料理",
      "ごちそう系": "特別な日や贅沢したい日に選びたい一皿",
      "ジャンク系": "背徳感までおいしい、やみつきになる味わい",
      "おつまみ系": "お酒のお供にもぴったりな気軽につまめる料理"
    };

    const params = new URLSearchParams(window.location.search);
    const tagName = params.get("name");

    if (tagName) {
      const filtered = meals.filter(m => m.tags.includes(tagName));

      document.title = tagName + " | 今日なに食べよーかな";
      document.querySelector('meta[name="description"]')
        .setAttribute("content", tagName + "に該当するメニューの一覧です。");
      document.getElementById("tagTitle").textContent = "🏷️ " + tagName + "（" + filtered.length + "品）";
      document.getElementById("tagDesc").textContent = tagDescs[tagName] || "";

      const list = document.getElementById("tagMealList");
      filtered.forEach(m => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = "menu/" + m.id + ".html";
        a.textContent = m.emoji + " " + m.name;
        li.appendChild(a);
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
