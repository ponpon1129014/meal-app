<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="カレーの特徴やカロリー、おすすめの食べ方を紹介します。">
  <title>カレー | 今日なに食べよーかな</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="container">
    <h1>🍛 カレー</h1>
    <div class="menu-detail">
      <img src="../images/curry.jpg" alt="カレー">
      <p>スパイスが効いた定番の人気メニュー。ボリュームがあってがっつり食べたいときにぴったりです。</p>
      <ul>
        <li>カロリー目安：700〜900kcal</li>
        <li>満足度：★★★★★</li>
        <li>調理時間目安：30〜60分</li>
      </ul>

<div class="same-type-list">
  <h2>同じジャンルのメニュー</h2>
  <ul id="sameTypeList"></ul>
</div>

      <div class="redraw-buttons">
  <button id="sameTypeBtn">同じジャンルで引き直す</button>
  <button id="changeTypeBtn">ジャンルを変えて引き直す</button>
</div>

      <a href="../index.html">← トップに戻る</a>
    </div>

<div class="recipe-links">
  <h2>レシピを探す</h2>
  <a id="cookpadLink" href="" target="_blank">🍳 クックパッドで見る</a>
  <a id="delishLink" href="" target="_blank">🎥 デリッシュキッチンで見る</a>
</div>

  </div>

<script src="../meals.js"></script>

 <script>
    const lastTypes = localStorage.getItem("selectedTypes");

    document.getElementById("sameTypeBtn").addEventListener("click", () => {
      if (lastTypes) {
        window.location.href = "../index.html?types=" + lastTypes;
      } else {
        window.location.href = "../index.html";
      }
    });

    document.getElementById("changeTypeBtn").addEventListener("click", () => {
      window.location.href = "../index.html";
    });

    const currentId = "curry";
const currentMeal = meals.find(m => m.id === currentId);

if (currentMeal) {
  const sameType = meals.filter(m => m.type === currentMeal.type && m.id !== currentId);
  
  const count = Math.random() < 0.5 ? 4 : 5;
  const shuffled = sameType.sort(() => Math.random() - 0.5).slice(0, count);

  const list = document.getElementById("sameTypeList");
  shuffled.forEach(meal => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = meal.id + ".html";
    a.textContent = meal.name;
    li.appendChild(a);
    list.appendChild(li);
  });
}

const mealName = "カレー";
document.getElementById("cookpadLink").href = "https://cookpad.com/search/" + encodeURIComponent(mealName);
document.getElementById("delishLink").href = "https://delishkitchen.tv/search?q=" + encodeURIComponent(mealName);

  </script>

</body>
</html>
